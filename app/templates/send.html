{% extends "base.html" %}

{% block content %}

<h1 class="text-2xl font-semibold mb-4">Compose Email</h1>

<!-- 🔴 Error container (move ABOVE form) -->
<div id="form-errors"></div>

<form 
    hx-post="/emails/send"
    hx-target="#form-errors"
    hx-swap="innerHTML"
    class="bg-white p-6 rounded shadow space-y-4"
>

    <input name="receiver_email" placeholder="To (email)"
           class="w-full p-2 border rounded" />

    <input name="subject" placeholder="Subject"
           class="w-full p-2 border rounded" />

    <textarea name="body" rows="6"
              class="w-full p-2 border rounded"
              placeholder="Write your message..."></textarea>

    <button class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
        Send
    </button>

</form>
<script>
function handleFormError(event) {
    const target = document.querySelector("#form-errors");
    target.innerHTML = event.detail.xhr.response;
}
</script>

{% endblock %}
