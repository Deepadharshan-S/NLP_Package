<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex items-center justify-center h-screen bg-gray-100">

<form method="post" action="/login"
      class="bg-white p-8 rounded shadow-md w-80">

    <h2 class="text-xl font-bold mb-4 text-center">Login</h2>

    <!-- 🔴 Error Message -->
    {% if error %}
    <div class="bg-red-100 text-red-700 p-2 mb-3 rounded">
        {{ error }}
    </div>
    {% endif %}

    <input name="email" placeholder="Email"
           class="w-full p-2 mb-3 border rounded" />

    <input name="password" type="password"
           placeholder="Password"
           class="w-full p-2 mb-4 border rounded" />

    <button class="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600">
        Login
    </button>

    <!-- 🔗 Register Link -->
    <p class="text-sm text-center mt-3">
        Don't have an account?
        <a href="/register" class="text-blue-500">Register</a>
    </p>

</form>

</body>
</html>
