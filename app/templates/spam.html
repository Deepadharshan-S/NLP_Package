{% extends "base.html" %}

{% block content %}

<h1 class="text-2xl font-semibold mb-4 text-red-600">Spam</h1>

<div class="flex h-[calc(100vh-80px)] gap-4 p-4">

    <!-- 📥 Email List -->
    <div class="w-1/3 bg-white rounded-xl shadow overflow-hidden flex flex-col">


        <!-- List -->
        <div 
            id="email-list"
            class="overflow-y-auto flex-1"
            hx-get="/emails/spam/list"
            hx-trigger="load"
            hx-target="#email-list"
            hx-swap="innerHTML">
        </div>

    </div>

    <!-- 📖 Email Content -->
    <div id="email-content"
         class="flex-1 bg-white rounded-xl shadow p-6 overflow-y-auto">

        <p class="text-gray-400 text-center mt-20">
            Select a spam email to view
        </p>

    </div>

</div>


{% endblock %}
