{% if errors %}
<div class="bg-red-50 border border-red-400 text-red-700 px-4 py-3 rounded mb-4 shadow-sm">
    
    <div class="font-semibold mb-2">
        ⚠️ Please fix the following errors:
    </div>

    <ul class="list-disc pl-5 text-sm space-y-1">
        {% for error in errors %}
            <li>{{ error }}</li>
        {% endfor %}
    </ul>

</div>
{% endif %}
